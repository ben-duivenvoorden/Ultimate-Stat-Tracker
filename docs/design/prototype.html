<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Stat Tracker — Wireframe Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080808;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Roboto', sans-serif;
    gap: 10px;
    padding: 20px;
  }
  .meta {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 860px;
    max-width: 100%;
  }
  .state-badge {
    font-family: 'Roboto Mono', monospace;
    font-size: 11px;
    color: #555;
    background: #141414;
    border: 1px solid #222;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .state-badge span { color: #4a9eff; }
  .device-wrap {
    width: 860px;
    max-width: 100%;
  }
  .device {
    width: 860px;
    height: 396px;
    background: #111;
    border-radius: 22px;
    border: 1.5px solid #2a2a2a;
    overflow: hidden;
    position: relative;
    box-shadow: 0 12px 60px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.04);
    max-width: 100%;
  }
  .status-bar {
    height: 22px;
    background: #0b0b0b;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    font-size: 10px;
    font-family: 'Roboto Mono', monospace;
    color: #555;
    flex-shrink: 0;
    border-bottom: 1px solid #1a1a1a;
  }
  .screen-root {
    height: 374px;
    overflow: hidden;
    position: relative;
  }
</style>
</head>
<body>

<div class="meta">
  <div class="state-badge">Screen <span id="stateLabel">1a — No Game Selected</span></div>
  <div style="font-size:11px;color:#333;font-family:'Roboto Mono',monospace;">tap to interact · landscape prototype · dark wireframe</div>
</div>

<div class="device-wrap">
  <div class="device">
    <div class="status-bar">
      <span>9:41</span>
      <span>Ultimate Stat Tracker</span>
      <span>▐▐▐  ●●●</span>
    </div>
    <div class="screen-root">
      <div id="root" style="height:100%"></div>
    </div>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Palette ──────────────────────────────────────────────────────────────────
const C = {
  bg:       '#111111',
  surf:     '#181818',
  surf2:    '#202020',
  surf3:    '#282828',
  border:   '#2c2c2c',
  border2:  '#383838',
  text:     '#e8e8e8',
  muted:    '#666666',
  dim:      '#444444',
  teamA:    '#4a9eff',   // Brisbanites — blue
  teamB:    '#ff6640',   // Extinction — orange
  success:  '#3dba78',
  warn:     '#f5a623',
  danger:   '#ff4d4d',
  block:    '#9c6ef8',   // purple — block mode
  blockBg:  '#150f24',
  injuryBg: '#1c1200',   // dark amber — injury pick mode
};

// ─── Data ─────────────────────────────────────────────────────────────────────
const TEAMS = {
  A: { name: 'Brisbanites', short: 'BRI', color: C.teamA },
  B: { name: 'Extinction',  short: 'EXT', color: C.teamB },
};
const ALL_PLAYERS = {
  A: ['Sam W.', 'Jordan K.', 'Mia T.', 'Lachlan B.', 'Priya S.', 'Tom H.', 'Evie R.'],
  B: ['Callum D.', 'Jess O.', 'Marcus L.', 'Tara N.', 'Flynn M.', 'Soph C.', 'Rhys P.'],
};
const GAMES = [
  { id: 1, name: 'Pool Play — Round 1', time: '09:00', status: 'scheduled' },
  { id: 2, name: 'Pool Play — Round 2', time: '11:30', status: 'in-progress', score: { A: 5, B: 4 } },
  { id: 3, name: 'Crossover',           time: '14:00', status: 'scheduled' },
  { id: 4, name: 'Semi-Final',          time: '16:30', status: 'scheduled' },
];

// ─── Shared UI ────────────────────────────────────────────────────────────────
const mono = { fontFamily: "'Roboto Mono', monospace" };

const Label = ({ children, color = C.muted, style: s = {} }) => (
  <span style={{ fontSize: 10, letterSpacing: '0.08em', fontFamily: "'Roboto Mono', monospace", color, ...s }}>
    {children}
  </span>
);

const Chip = ({ children, color = C.muted }) => (
  <span style={{
    display: 'inline-flex', alignItems: 'center', padding: '2px 7px',
    borderRadius: 20, fontSize: 10, fontFamily: "'Roboto Mono', monospace",
    background: color + '1a', color, border: `1px solid ${color}33`,
    letterSpacing: '0.06em', whiteSpace: 'nowrap',
  }}>{children}</span>
);

// Generic button — variants: default | primary | ghost | success | warn | danger | block
const Btn = ({ children, onClick, variant = 'default', size = 'md', style: s = {}, disabled = false, full = false }) => {
  const ht = { xs: 28, sm: 34, md: 44, lg: 52, xl: 60 };
  const fs = { xs: 11, sm: 12, md: 14, lg: 15, xl: 17 };
  const px = { xs: 8,  sm: 10, md: 14, lg: 18, xl: 22 };
  const vMap = {
    default: { bg: C.surf3,    color: C.text,    border: C.border2 },
    primary: { bg: C.teamA,    color: '#fff',    border: 'transparent' },
    ghost:   { bg: 'transparent', color: C.muted, border: C.border },
    success: { bg: C.success,  color: '#fff',    border: 'transparent' },
    warn:    { bg: C.warn,     color: '#111',    border: 'transparent' },
    danger:  { bg: C.danger,   color: '#fff',    border: 'transparent' },
    block:   { bg: C.block,    color: '#fff',    border: 'transparent' },
    teamA:   { bg: C.teamA + '22', color: C.teamA, border: C.teamA + '55' },
    teamB:   { bg: C.teamB + '22', color: C.teamB, border: C.teamB + '55' },
  };
  const v = vMap[variant] || vMap.default;
  return (
    <button onClick={disabled ? undefined : onClick} style={{
      height: ht[size], padding: `0 ${px[size]}px`, fontSize: fs[size], fontWeight: 600,
      fontFamily: 'Roboto', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      borderRadius: 7, border: `1px solid ${v.border}`, background: v.bg, color: v.color,
      cursor: disabled ? 'default' : 'pointer', opacity: disabled ? 0.3 : 1,
      width: full ? '100%' : undefined, userSelect: 'none', transition: 'opacity 0.1s',
      whiteSpace: 'nowrap', ...s,
    }}>{children}</button>
  );
};

// ─── Screen 1: Game Setup ─────────────────────────────────────────────────────
const GameSetup = ({ onNav, setLabel }) => {
  const [sel, setSel] = useState(null);
  const [pullFirst, setPullFirst] = useState(null);
  const game = sel ? GAMES.find(g => g.id === sel) : null;

  useEffect(() => {
    setLabel(sel ? '1b — Game In Progress' : '1a — No Game Selected');
  }, [sel]);

  return (
    <div style={{ display: 'flex', height: '100%', background: C.bg }}>
      {/* Game list */}
      <div style={{ width: 272, borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '10px 14px 8px', borderBottom: `1px solid ${C.border}` }}>
          <Label style={{ display: 'block', marginBottom: 3 }}>GAME SETUP</Label>
          <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>Select Game</div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {GAMES.map(g => {
            const active = sel === g.id;
            return (
              <div key={g.id} onClick={() => setSel(g.id)} style={{
                padding: '10px 14px', cursor: 'pointer',
                borderLeft: `3px solid ${active ? C.teamA : 'transparent'}`,
                background: active ? C.surf2 : 'transparent',
                borderBottom: `1px solid ${C.border}`,
              }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 5 }}>{g.name}</div>
                <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
                  <Chip color={g.status === 'in-progress' ? C.success : C.muted}>
                    {g.status === 'in-progress' ? 'LIVE' : 'SCHED'}
                  </Chip>
                  <Label>{g.time}</Label>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Detail pane */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px 28px', gap: 14 }}>
        {!game ? (
          <div style={{ textAlign: 'center', color: C.dim }}>
            <div style={{ fontSize: 36, marginBottom: 10, opacity: 0.4 }}>🥏</div>
            <div style={{ fontSize: 13, color: C.muted }}>Select a game from the list</div>
          </div>
        ) : (
          <>
            <div style={{
              background: C.surf, border: `1px solid ${C.border2}`, borderRadius: 12,
              padding: '16px 28px', width: '100%', textAlign: 'center',
            }}>
              <Label style={{ display: 'block', marginBottom: 6 }}>{game.name}</Label>
              {game.status === 'in-progress' && game.score ? (
                <>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 20, margin: '8px 0' }}>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: C.teamA, marginBottom: 2 }}>BRI</div>
                      <div style={{ fontSize: 52, fontWeight: 900, color: C.text, lineHeight: 1 }}>{game.score.A}</div>
                    </div>
                    <div style={{ color: C.muted, fontSize: 20 }}>—</div>
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: C.teamB, marginBottom: 2 }}>EXT</div>
                      <div style={{ fontSize: 52, fontWeight: 900, color: C.text, lineHeight: 1 }}>{game.score.B}</div>
                    </div>
                  </div>
                  <Label>In progress · Started {game.time}</Label>
                </>
              ) : (
                <div style={{ padding: '10px 0' }}>
                  <div style={{ fontSize: 15, color: C.text, marginBottom: 4 }}>Brisbanites  vs  Extinction</div>
                  <Label>Kick-off {game.time}</Label>
                </div>
              )}
            </div>
            {/* Who pulls first — only on first start */}
            {game.status !== 'in-progress' && (
              <div style={{ width: '100%', maxWidth: 360 }}>
                <Label style={{ display: 'block', textAlign: 'center', marginBottom: 8 }}>WHO PULLS FIRST?</Label>
                <div style={{ display: 'flex', gap: 8 }}>
                  <Btn variant={pullFirst === 'A' ? 'teamA' : 'ghost'} size="md" style={{ flex: 1 }} onClick={() => setPullFirst('A')}>Brisbanites</Btn>
                  <Btn variant={pullFirst === 'B' ? 'teamB' : 'ghost'} size="md" style={{ flex: 1 }} onClick={() => setPullFirst('B')}>Extinction</Btn>
                </div>
              </div>
            )}
            <div style={{ display: 'flex', gap: 10 }}>
              {game.status === 'in-progress' ? (
                <>
                  <Btn variant="primary" size="lg" onClick={() => onNav('line', { pullingTeam: 'B' })}>▶  Continue Recording</Btn>
                  <Btn variant="ghost" size="lg">Export</Btn>
                </>
              ) : (
                <Btn variant="primary" size="lg" disabled={!pullFirst} onClick={() => onNav('line', { pullingTeam: pullFirst })}>Start Recording</Btn>
              )}
            </div>
          </>
        )}
      </div>
    </div>
  );
};

// ─── Screen 2: Line Selection ─────────────────────────────────────────────────
const LineSelection = ({ onNav, injurySub = false, injuryTeam = null, setLabel }) => {
  const initA = injurySub ? ALL_PLAYERS.A.slice(0, 7) : ALL_PLAYERS.A.slice(0, 7);
  const initB = injurySub ? ALL_PLAYERS.B.slice(0, 7) : ALL_PLAYERS.B.slice(0, 7);
  const [selA, setSelA] = useState(initA);
  const [selB, setSelB] = useState(initB);

  useEffect(() => { setLabel(injurySub ? '2b — Injury Sub (mid-point)' : '2a — Between Points'); }, []);

  const toggle = (team, player) => {
    const [sel, setSel] = team === 'A' ? [selA, setSelA] : [selB, setSelB];
    setSel(sel.includes(player) ? sel.filter(p => p !== player) : sel.length < 7 ? [...sel, player] : sel);
  };

  const canConfirm = selA.length > 0 && selB.length > 0;
  const warnA = selA.length < 7;
  const warnB = selB.length < 7;

  const TeamColumn = ({ team, sel, color, label }) => (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', borderRight: team === 'A' ? `1px solid ${C.border}` : 'none' }}>
      <div style={{ padding: '6px 12px', borderBottom: `1px solid ${C.border}`, display: 'flex', gap: 8, alignItems: 'center' }}>
        <span style={{ fontSize: 12, fontWeight: 700, color }}>{label}</span>
        <Chip color={sel.length === 7 ? C.success : sel.length > 0 ? C.warn : C.muted}>{sel.length} / 7</Chip>
      </div>
      <div style={{ flex: 1, padding: '5px 8px', display: 'flex', flexDirection: 'column', gap: 3, overflowY: 'auto' }}>
        {ALL_PLAYERS[team].map(p => {
          const on = sel.includes(p);
          return (
            <div key={p} onClick={() => toggle(team, p)} style={{
              height: 38, display: 'flex', alignItems: 'center', padding: '0 10px', gap: 8,
              borderRadius: 6, cursor: 'pointer', border: `1px solid ${on ? color + '55' : C.border}`,
              background: on ? color + '18' : C.surf2, transition: 'all 0.1s',
            }}>
              <div style={{
                width: 16, height: 16, borderRadius: 3, border: `1.5px solid ${on ? color : C.dim}`,
                background: on ? color : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0, fontSize: 10, color: '#fff',
              }}>{on ? '✓' : ''}</div>
              <span style={{ fontSize: 14, fontWeight: on ? 600 : 400, color: on ? C.text : C.muted }}>{p}</span>
            </div>
          );
        })}
      </div>
    </div>
  );

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: C.bg }}>
      {/* Header bar */}
      <div style={{ padding: '8px 14px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
        <div>
          <Label style={{ display: 'block', marginBottom: 2 }}>{injurySub ? 'INJURY SUBSTITUTION — MID-POINT' : 'LINE SELECTION'}</Label>
          <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{injurySub ? 'Swap one player, then confirm' : 'Pick up to 7 active players per team'}</div>
        </div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {(warnA || warnB) && !injurySub && (
            <Chip color={C.warn}>Fewer than 7 selected</Chip>
          )}
          <Btn variant="ghost" size="sm" onClick={() => onNav('game')}>← Back</Btn>
          <Btn variant="primary" size="md" disabled={!canConfirm}
            onClick={() => onNav('live', { lineA: selA, lineB: selB })}>
            {injurySub ? 'Confirm Sub' : 'Confirm Line →'}
          </Btn>
        </div>
      </div>
      {/* Two columns */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <TeamColumn team="A" sel={selA} color={C.teamA} label="Brisbanites" />
        <TeamColumn team="B" sel={selB} color={C.teamB} label="Extinction" />
      </div>
    </div>
  );
};

// ─── Screen 3: Live Event Entry ───────────────────────────────────────────────
// rawLog  — append-only, every event including undo markers
// visLog  — derived: process rawLog, each 'undo' entry pops the last non-system visible event

const computeVisLog = (raw) => {
  const out = [];
  for (const e of raw) {
    if (e.type === 'undo') {
      // pop last non-system entry
      for (let i = out.length - 1; i >= 0; i--) {
        if (out[i].type !== 'system') { out.splice(i, 1); break; }
      }
    } else if (e.type === 'receiver-error-amend') {
      // amend the last possession entry in-place — no new row
      for (let i = out.length - 1; i >= 0; i--) {
        if (out[i].type === 'possession') {
          out[i] = {
            ...out[i],
            type: 'turnover',
            text: `⚡ Receiver Error — ${out[i].text.replace('→ ', '')}`,
          };
          break;
        }
      }
    } else {
      out.push(e);
    }
  }
  return out;
};

const INIT_RAW = [
  { id: 1, type: 'system', text: 'Point started — BRI receiving' },
];

const LiveEvent = ({ lineA, lineB, onNav, setLabel, startState = 'awaiting-puller', pullingTeam: initPullingTeam = 'B' }) => {
  const [ls, setLs_]            = useState(startState);
  const [score, setScore]        = useState({ A: 5, B: 4 });
  // possession = team currently holding disc (= team that receives the pull)
  const [possession, setPossession] = useState(initPullingTeam === 'A' ? 'B' : 'A');
  const [attackLeft, setAttackLeft] = useState(initPullingTeam === 'A' ? 'B' : 'A');
  const [gameStartPullingTeam]   = useState(initPullingTeam); // fixed — drives half-time logic
  const [rawLog, setRawLog]      = useState(INIT_RAW);
  const [discHolder, setDiscHolder] = useState(null);
  const [selPuller, setSelPuller]   = useState(null);
  const [pickType, setPickType]     = useState(null);
  const [showEventMenu, setShowEventMenu] = useState(false);
  const logRef = useRef(null);

  const pullingTeam   = possession === 'A' ? 'B' : 'A';
  const defendingTeam = possession === 'A' ? 'B' : 'A';

  const stateLabels = {
    'awaiting-puller':      '3a — Awaiting Puller',
    'puller-selected':      '3b — Puller Selected',
    'pass-chain':           '3c — Pass Chain',
    'defensive-block-pick': '3e — Defensive Block Pick',
    'injury-pick':          '3c — Injury Sub Pick',
    'point-over':           '3f — Point Over',
    'half-time':            '3g — Half Time',
    'end-game':             '3h — End Game',
  };
  const setLs = (s) => { setLs_(s); setLabel(stateLabels[s] || s); };
  useEffect(() => { setLabel(stateLabels[ls]); }, []);

  const visLog = computeVisLog(rawLog);
  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [visLog.length]);

  const addRaw = (entry) => setRawLog(prev => [...prev, { id: Date.now() + Math.random(), ...entry }]);

  const isBlockMode   = ls === 'defensive-block-pick';
  const isInjuryPick  = ls === 'injury-pick';
  const isPickMode    = isBlockMode || isInjuryPick;
  const isTerminal    = ['point-over', 'half-time', 'end-game'].includes(ls);
  const isPullPhase   = ls === 'awaiting-puller' || ls === 'puller-selected';
  const showStoppages = !isTerminal && !isPickMode && ls !== 'awaiting-puller';
  const cancelPickMode = () => setLs('pass-chain');

  const displayTeam = isPullPhase ? pullingTeam : isBlockMode ? defendingTeam : possession;
  const players     = displayTeam === 'A' ? lineA : lineB;
  const teamColor   = TEAMS[displayTeam].color;

  const visLogColor = (t) => ({ goal: C.success, turnover: C.danger, block: C.block, pull: C.teamA, possession: C.muted, system: C.dim }[t] || C.muted);

  // ── handlers ──
  const handlePlayerTap = (player) => {
    if (isInjuryPick) {
      onNav('injury', { injuredPlayer: player });
      setLs('pass-chain');
    } else if (isBlockMode) {
      const label = pickType === 'intercept' ? 'Intercept' : 'Block';
      addRaw({ type: 'block', text: `▣ Defensive ${label} — ${player} (${TEAMS[defendingTeam].short})` });
      setPossession(defendingTeam);
      setDiscHolder(null);
      setPickType(null);
      setLs('pass-chain');
    } else if (isPullPhase) {
      // toggle puller selection
      const next = selPuller === player ? null : player;
      setSelPuller(next);
      setLs(next ? 'puller-selected' : 'awaiting-puller');
    } else {
      // PASS-CHAIN: tap = immediate possession transfer (inferred pass)
      addRaw({ type: 'possession', text: `→ ${player} (${TEAMS[possession].short})` });
      setDiscHolder(player);
    }
  };

  const handlePull = (bonus = false) => {
    addRaw({ type: 'pull', text: `${bonus ? 'Pull Bonus' : 'Pull'} — ${selPuller} (${TEAMS[displayTeam].short})` });
    setSelPuller(null);
    setDiscHolder(null);
    setLs('pass-chain');
  };

  const handleReceiverError = () => {
    // Amends last possession entry in visible log rather than appending a new row
    addRaw({ type: 'receiver-error-amend' });
    setPossession(p => p === 'A' ? 'B' : 'A');
    setDiscHolder(null);
    setLs('pass-chain');
  };

  const handleThrowAway = () => {
    addRaw({ type: 'turnover', text: `⚡ Throw Away — ${discHolder} (${TEAMS[possession].short})` });
    setPossession(p => p === 'A' ? 'B' : 'A');
    setDiscHolder(null);
    setLs('pass-chain');
  };

  const handleDefBlock = (type = 'block') => {
    setPickType(type);
    setDiscHolder(null);
    setLs('defensive-block-pick');
  };

  const handleGoal = () => {
    const team = possession;
    const newScore = { ...score, [team]: score[team] + 1 };
    addRaw({ type: 'goal', text: `⬥ Goal — ${discHolder} (${TEAMS[team].short})` });
    setScore(newScore);
    setDiscHolder(null);
    const total = newScore.A + newScore.B;
    if (newScore.A >= 15 || newScore.B >= 15) {
      addRaw({ type: 'system', text: '— Game Completed —' });
      setLs('end-game');
    } else if (total === 13) {
      // Auto-insert half time — skip point-over, go straight to 3g
      addRaw({ type: 'system', text: '— Half Time —' });
      setLs('half-time');
    } else {
      setLs('point-over');
    }
  };

  // Undo: append undo marker to raw — visible log resolves by popping last event
  const handleUndo = () => {
    const canUndo = visLog.some(e => e.type !== 'system');
    if (!canUndo) return;
    addRaw({ type: 'undo', _internal: true });
    // also revert disc holder if last vis event was a possession
    const lastVis = [...visLog].reverse().find(e => e.type !== 'system');
    if (lastVis?.type === 'possession') setDiscHolder(null);
    if (lastVis?.type === 'turnover')   setPossession(p => p === 'A' ? 'B' : 'A');
  };

  const attackingTeam  = TEAMS[attackLeft];
  const defendingLabel = TEAMS[attackLeft === 'A' ? 'B' : 'A'];
  // actions in pass-chain enabled only when disc holder is known
  const actionsArmed = !!discHolder && !isTerminal && !isPickMode && !isPullPhase;
  // Players appear on left when displayTeam is the attacking-left team, right otherwise
  const playersOnLeft = displayTeam === attackLeft;

  // action tile definition for pass-chain and pull phase
  const pullTiles = [
    { label: 'Pull',       variant: 'primary', action: () => handlePull(false), disabled: !selPuller },
    { label: 'Pull Bonus', variant: 'warn',    action: () => handlePull(true),  disabled: !selPuller },
  ];
  const noPosnArmed = !isTerminal && !isPickMode && !isPullPhase;

  const chainTiles = [
    { label: 'Incomplete',          variant: 'separator', action: null,                             disabled: true },
    { label: 'Receiver Error',      variant: 'danger',    action: handleReceiverError,               disabled: !actionsArmed },
    { label: 'Turnover',            variant: 'separator', action: null,                             disabled: true },
    { label: 'Throw Away',          variant: 'warn',      action: handleThrowAway,                   disabled: !actionsArmed },
    { label: 'Defensive Block',     variant: 'block',     action: () => handleDefBlock('block'),     disabled: !noPosnArmed },
    { label: 'Defensive Intercept', variant: 'block',     action: () => handleDefBlock('intercept'), disabled: !noPosnArmed },
    { label: 'Complete',            variant: 'separator', action: null,                             disabled: true },
    { label: 'Goal',                variant: 'success',   action: handleGoal,                        disabled: !actionsArmed },
  ];
  const tiles = isPullPhase ? pullTiles : chainTiles;

  const vMap = {
    default: { bg: C.surf3,    color: C.text,    border: C.border2 },
    primary: { bg: C.teamA,    color: '#fff',    border: 'transparent' },
    ghost:   { bg: 'transparent', color: C.muted, border: C.border },
    success: { bg: C.success,  color: '#fff',    border: 'transparent' },
    warn:    { bg: C.warn,     color: '#111',    border: 'transparent' },
    danger:  { bg: C.danger,   color: '#fff',    border: 'transparent' },
    block:   { bg: C.block,    color: '#fff',    border: 'transparent' },
  };

  return (
    <div style={{ height: '100%', display: 'flex', background: C.bg, overflow: 'hidden', position: 'relative' }}>

      {/* ── Players pane — swaps left/right with possession ── */}
      <div style={{
        flex: 1, order: playersOnLeft ? 1 : 3,
        display: 'flex', flexDirection: 'column', position: 'relative',
        background: isBlockMode ? C.blockBg : isInjuryPick ? C.injuryBg : C.bg,
        transition: 'background 0.2s',
      }}>
        {/* slim score + team strip */}
        {isPickMode && <div style={{ position: 'absolute', inset: 0, zIndex: 0 }} onClick={cancelPickMode} />}
        <div style={{ padding: '0 8px', borderBottom: `1px solid ${isBlockMode ? C.block + '33' : isInjuryPick ? C.warn + '33' : C.border}`, flexShrink: 0, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'relative', zIndex: 1, gap: 6 }}>
          <div>
            <Label color={isBlockMode ? C.block : isInjuryPick ? C.warn : C.muted} style={{ fontSize: 9 }}>
              {isBlockMode ? 'PICK BLOCKER' : isInjuryPick ? 'PICK INJURED' : isPullPhase ? 'PULLING' : 'POSSESSION'}
            </Label>
            <div style={{ fontSize: 11, fontWeight: 700, color: isBlockMode ? C.block : isInjuryPick ? C.warn : teamColor, lineHeight: 1.2 }}>
              {TEAMS[displayTeam].short}
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <span style={{ color: C.teamA, fontSize: 10, fontWeight: 700 }}>BRI <strong style={{ fontSize: 15, fontWeight: 900, color: C.text }}>{score.A}</strong></span>
            <span style={{ color: C.muted, fontSize: 9, margin: '0 3px' }}>–</span>
            <span style={{ color: C.teamB, fontSize: 10, fontWeight: 700 }}><strong style={{ fontSize: 15, fontWeight: 900, color: C.text }}>{score.B}</strong> EXT</span>
          </div>
        </div>

        {/* players — fill remaining height */}
        {isTerminal ? <div style={{ flex: 1 }} /> : (
          <div style={{ flex: 1, padding: '4px 5px', display: 'grid', gridTemplateRows: 'repeat(7, 1fr)', gap: 3, overflow: 'hidden', position: 'relative', zIndex: 1 }}>
            {players.map(p => {
              const highlight  = p === discHolder || p === selPuller;
              const pickColor  = isBlockMode ? C.block : isInjuryPick ? C.warn : teamColor;
              return (
                <button key={p} onClick={(e) => { e.stopPropagation(); handlePlayerTap(p); }} style={{
                  display: 'flex', alignItems: 'center', padding: '0 10px', gap: 7,
                  borderRadius: 6, cursor: 'pointer', userSelect: 'none', textAlign: 'left',
                  border: `1px solid ${isPickMode ? pickColor + '66' : highlight ? teamColor : C.border}`,
                  background: isPickMode ? pickColor + '1a' : highlight ? teamColor + '28' : C.surf2,
                  color: C.text, fontSize: 14, fontWeight: highlight ? 700 : 400,
                  transition: 'all 0.1s',
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: '50%', flexShrink: 0, background: isPickMode ? pickColor : highlight ? teamColor : C.border, transition: 'background 0.1s' }} />
                  {p}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* ── Action pane — always centre ── */}
      <div style={{ flex: 1, order: 2, borderLeft: `1px solid ${C.border}`, borderRight: `1px solid ${C.border}`, display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '0 10px', borderBottom: `1px solid ${C.border}`, flexShrink: 0, height: 28, display: 'flex', alignItems: 'center' }}>
          {isBlockMode ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: C.block, boxShadow: `0 0 6px ${C.block}`, display: 'inline-block', flexShrink: 0 }} />
              <Label color={C.block} style={{ fontSize: 9 }}>PICK {pickType === 'intercept' ? 'INTERCEPTOR' : 'BLOCKER'} FROM {TEAMS[defendingTeam].short} · tap bg to cancel</Label>
            </div>
          ) : isInjuryPick ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: C.warn, boxShadow: `0 0 6px ${C.warn}`, display: 'inline-block', flexShrink: 0 }} />
              <Label color={C.warn} style={{ fontSize: 9 }}>WHO IS INJURED? · tap bg to cancel</Label>
            </div>
          ) : (
            <Label style={{ fontSize: 9 }}>
              {isPullPhase
                ? (selPuller ? selPuller.toUpperCase() : 'TAP PULLER FIRST')
                : (discHolder ? `DISC WITH ${discHolder.toUpperCase()}` : 'TAP PLAYER FIRST')}
            </Label>
          )}
        </div>

        {/* tiles */}
        {isTerminal ? (
          <TerminalPanel ls={ls} score={score} log={visLog} onNext={() => onNav('line')} attackLeft={attackLeft} gameStartPullingTeam={gameStartPullingTeam} />
        ) : isPickMode ? (
          <div style={{ flex: 1, padding: '5px', display: 'flex', flexDirection: 'column', gap: 4 }}>
            <div style={{
              height: 52, borderRadius: 7, flexShrink: 0,
              background: isBlockMode ? C.block + '28' : C.warn + '1a',
              border: `1px solid ${isBlockMode ? C.block : C.warn}`,
              color: isBlockMode ? C.block : C.warn,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 14, fontWeight: 700,
            }}>
              {isBlockMode ? (pickType === 'intercept' ? 'Defensive Intercept' : 'Defensive Block') : 'Injury Sub'}
            </div>
            <div style={{ flex: 1 }} />
          </div>
        ) : (
          <div style={{ flex: 1, padding: '5px', display: 'flex', flexDirection: 'column', gap: 4, overflow: 'hidden' }}>
            {tiles.map(t => {
              if (t.variant === 'separator') {
                return (
                  <div key={t.label} style={{
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 9, fontWeight: 500, color: C.dim,
                    flexShrink: 0, height: 20, userSelect: 'none',
                    letterSpacing: '0.08em', padding: '0 4px',
                    borderBottom: `1px solid ${C.border}`,
                    fontFamily: "'Roboto Mono', monospace",
                  }}>{t.label.toUpperCase()}</div>
                );
              }
              const v = vMap[t.variant] || vMap.default;
              return (
                <button key={t.label} onClick={t.disabled ? undefined : t.action}
                  style={{
                    flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
                    borderRadius: 7, border: `1px solid ${t.disabled ? C.border : v.border}`,
                    background: t.disabled ? C.surf2 : v.bg,
                    color: t.disabled ? C.dim : v.color,
                    fontSize: 14, fontWeight: 600,
                    cursor: t.disabled ? 'default' : 'pointer',
                    opacity: t.disabled ? 0.4 : 1,
                    transition: 'all 0.1s', userSelect: 'none',
                  }}>
                  {t.label}
                </button>
              );
            })}
          </div>
        )}

        {/* Stoppages at very bottom — hidden in 3a */}
        {showStoppages && (
          <div style={{ padding: '5px', borderTop: `1px solid ${C.border}`, flexShrink: 0 }}>
            <Btn variant="ghost" size="sm" full onClick={() => setShowEventMenu(v => !v)}>Stoppages</Btn>
          </div>
        )}
      </div>

      {/* ── Event log + Undo ── */}
      <div style={{ flex: 1, order: playersOnLeft ? 3 : 1, display: 'flex', flexDirection: 'column' }}>
        <div style={{ padding: '0 10px', borderBottom: `1px solid ${C.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0, height: 28 }}>
          <Label>EVENT LOG</Label>
          {ls !== 'end-game' && <Btn variant="ghost" size="xs">Edit</Btn>}
        </div>
        <div ref={logRef} style={{ flex: 1, padding: '4px 7px', display: 'flex', flexDirection: 'column', gap: 2, overflowY: 'auto' }}>
          {visLog.length === 0 && <Label style={{ padding: '8px 0', display: 'block', textAlign: 'center' }}>No events yet</Label>}
          {visLog.map(e => (
            <div key={e.id} style={{
              padding: '3px 7px', borderRadius: 4, fontSize: 11,
              fontFamily: e.type === 'system' ? "'Roboto Mono', monospace" : 'Roboto',
              borderLeft: `2px solid ${visLogColor(e.type)}`,
              background: visLogColor(e.type) + '12',
              color: ['possession','system'].includes(e.type) ? C.muted : visLogColor(e.type),
            }}>{e.text}</div>
          ))}
        </div>
        {/* Undo beneath log */}
        <div style={{ padding: '5px 7px', borderTop: `1px solid ${C.border}`, flexShrink: 0, display: 'flex', gap: 6 }}>
          {!isTerminal && <Btn variant="ghost" size="sm" onClick={handleUndo} full>↩ Undo</Btn>}
          {ls === 'end-game' && <Btn variant="primary" size="sm" full>Export Stats</Btn>}
        </div>
      </div>

      {/* ── Stoppages submenu ── */}
      {showEventMenu && (
        <div style={{ position: 'absolute', bottom: 38, left: 170, zIndex: 20 }} onClick={e => e.stopPropagation()}>
          <div style={{ background: C.surf, border: `1px solid ${C.border2}`, borderRadius: 10, padding: '8px', minWidth: 170, display: 'flex', flexDirection: 'column', gap: 5, boxShadow: '0 4px 24px rgba(0,0,0,0.8)' }}>
            <Label style={{ marginBottom: 2 }}>STOPPAGES</Label>
            <Btn variant="warn"  size="md" full onClick={() => { setShowEventMenu(false); setLs('injury-pick'); }}>Injury Sub</Btn>
            <Btn variant="ghost" size="md" full onClick={() => { setShowEventMenu(false); addRaw({ type: 'system', text: '— Half Time —' }); setLs('half-time'); }}>Half Time</Btn>
            <Btn variant="ghost" size="md" full onClick={() => { setShowEventMenu(false); addRaw({ type: 'system', text: '— Game Completed —' }); setLs('end-game'); }}>Game Completed</Btn>
          </div>
        </div>
      )}
      {showEventMenu && <div style={{ position: 'absolute', inset: 0, zIndex: 10 }} onClick={() => setShowEventMenu(false)} />}
    </div>
  );
};

// Terminal state panel (point-over / half-time / end-game)
const TerminalPanel = ({ ls, score, log, onNext, attackLeft, gameStartPullingTeam = 'B' }) => {
  const goalEntry = [...log].reverse().find(e => e.type === 'goal');
  const isHalf = ls === 'half-time';
  const isEnd  = ls === 'end-game';
  // Half-time: 2nd half puller = team that did NOT pull at game start
  const secondHalfPuller = gameStartPullingTeam === 'A' ? 'B' : 'A';

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10, padding: '10px 20px', textAlign: 'center' }}>
      {isEnd ? (
        <>
          <Label color={C.muted} style={{ letterSpacing: '0.12em' }}>GAME OVER · SESSION CLOSED</Label>
          <ScoreBlock score={score} big />
          <Label>No further entries</Label>
        </>
      ) : isHalf ? (
        <>
          <Label color={C.warn} style={{ fontSize: 13, letterSpacing: '0.1em' }}>HALF TIME</Label>
          <ScoreBlock score={score} />
          <div style={{ fontSize: 11, color: C.muted }}>
            Ends switched — {TEAMS[secondHalfPuller].name} pulls in 2nd half
          </div>
          <Btn variant="primary" size="md" onClick={onNext}>Line Selection →</Btn>
        </>
      ) : (
        <>
          <Label color={C.success} style={{ letterSpacing: '0.1em' }}>POINT OVER</Label>
          <ScoreBlock score={score} />
          {goalEntry && <div style={{ fontSize: 11, color: C.muted }}>Goal: {goalEntry.text.replace('⬥ Goal — ', '')}</div>}
          <Btn variant="primary" size="md" onClick={onNext}>Next Point →</Btn>
        </>
      )}
    </div>
  );
};

const ScoreBlock = ({ score, big = false }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: big ? 24 : 18 }}>
    <div>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.teamA, marginBottom: 2 }}>BRI</div>
      <div style={{ fontSize: big ? 54 : 42, fontWeight: 900, color: C.text, lineHeight: 1 }}>{score.A}</div>
    </div>
    <div style={{ color: C.muted, fontSize: 18 }}>—</div>
    <div>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.teamB, marginBottom: 2 }}>EXT</div>
      <div style={{ fontSize: big ? 54 : 42, fontWeight: 900, color: C.text, lineHeight: 1 }}>{score.B}</div>
    </div>
  </div>
);

// ─── Root App ─────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen]   = useState('game');
  const [stateLabel, setLabel] = useState('1a — No Game Selected');
  const [lineA, setLineA]     = useState(ALL_PLAYERS.A);
  const [lineB, setLineB]     = useState(ALL_PLAYERS.B);
  const [isInjury, setIsInjury] = useState(false);
  const [liveKey, setLiveKey] = useState(0);

  useEffect(() => {
    const el = document.getElementById('stateLabel');
    if (el) el.textContent = stateLabel;
  }, [stateLabel]);

  const [pullingTeam, setPullingTeam] = useState('B'); // team that pulls at game start

  const nav = (to, data) => {
    if (to === 'game')   { setScreen('game'); }
    if (to === 'line')   {
      setIsInjury(false);
      if (data?.pullingTeam) setPullingTeam(data.pullingTeam);
      setScreen('line');
    }
    if (to === 'injury') { setIsInjury(true);  setScreen('line'); }
    if (to === 'live')   {
      if (data) { setLineA(data.lineA); setLineB(data.lineB); }
      setLiveKey(k => k + 1);
      setScreen('live');
    }
  };

  return (
    <div style={{ height: '100%' }}>
      {screen === 'game' && <GameSetup onNav={nav} setLabel={setLabel} />}
      {screen === 'line' && <LineSelection key={isInjury ? 'inj' : 'norm'} onNav={nav} injurySub={isInjury} setLabel={setLabel} />}
      {screen === 'live' && <LiveEvent key={liveKey} lineA={lineA} lineB={lineB} onNav={nav} setLabel={setLabel} pullingTeam={pullingTeam} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
